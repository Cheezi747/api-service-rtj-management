#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
springdoc:
  swagger-ui:
    operationsSorter: alpha
    tagsSorter: alpha
spring:
  application:
    name: rtj-management
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: false
  jpa:
    properties:
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none
  security:
    oauth2:
      client:
        registration:
          operaton:
            authorization-grant-type: client_credentials
            provider: operaton
          citizen:
            authorization-grant-type: client_credentials
            provider: citizen
          templating:
            authorization-grant-type: client_credentials
            provider: templating
          messaging:
            authorization-grant-type: client_credentials
            provider: messaging
#========================================
# Integration settings
#========================================
integration:
  operaton:
    connect-timeout: 5
    read-timeout: 30
  citizen:
    connect-timeout: 5
    read-timeout: 30
  templating:
    connect-timeout: 5
    read-timeout: 30
    template-identifier: egensotning-beslut
    mottagningsbevis-template-identifier: egensotning-mottagningsbevis
  messaging:
    connect-timeout: 5
    read-timeout: 30
  # Eneo (LLM) document validation. url, api-key, oauth2.*, assistants.{brandskyddskontroll,egensotning}
  # and space-id are environment-provided (Dokploy env vars / config/.env) — never committed here.
  eneo:
    connect-timeout-in-seconds: 5
    read-timeout-in-seconds: 30
  # Lantmäteriet registerbeteckning (I4) — distriktskontroll av fastighetsbeteckning. client-id/secret
  # är hemligheter och sätts via miljö (Dokploy-env / config/.env), aldrig committade här.
  lantmateriet:
    oauth2-token-url: ${LANTMATERIET_OAUTH2_TOKEN_URL:https://api.lantmateriet.se/token}
    oauth2-client-id: ${LANTMATERIET_OAUTH2_CLIENT_ID:override}
    oauth2-client-secret: ${LANTMATERIET_OAUTH2_CLIENT_SECRET:override}
    registerbeteckning:
      url: ${LANTMATERIET_REGISTERBETECKNING_URL:https://api.lantmateriet.se/distribution/produkter/registerbeteckning/v5}
#========================================
# Egensotning domain settings
#========================================
egensotning:
  # Återansöknings-/dubblettkontroll i verifieringssteget. När true styrs en ansökan till manuell
  # granskning om sökanden redan har ett gällande beslut på samma fastighet (ACTIVE_PERMIT_EXISTS),
  # ett tidigare avslag (REAPPLICATION_REJECTED) eller ett pågående ärende (REAPPLICATION_ONGOING).
  # POC/demo: avstängd (false) så samma testperson/fastighet kan godkännas upprepat utan att fastna i
  # manuell granskning. Sätt true (env EGENSOTNING_REAPPLICATION_CHECK_ENABLED=true) för skarpt beteende.
  reapplication-check:
    enabled: false
  validity:
    # Antal år ett godkänt egensotningsmedgivande gäller (default 6). 0 = gäller tillsvidare
    # (inget utgångsdatum, inga förnyelsepåminnelser). Kan överstyras per miljö (EGENSOTNING_VALIDITY_YEARS).
    years: 6
  # Tillåtna registerområden (förbundets kommuner) för egensotning. Tom lista = ingen begränsning.
  # POC: lokal kontroll mot fastighetsbeteckningens inledande område; ersätts av Lantmäteri/WSO2-slagning.
  allowed-districts: Sundsvall,Timrå,Ånge
#========================================
# Notification settings
#========================================
notification:
  ttl: P30D
scheduler:
  notification-cleanup:
    cron: '0 0 2 * * *'
    name: notification-cleanup
    shedlock-lock-at-most-for: PT5M
    maximum-execution-time: PT5M
  egensotning-expiry-reminder:
    cron: '0 0 3 * * *'
    name: egensotning-expiry-reminder
    shedlock-lock-at-most-for: PT5M
    maximum-execution-time: PT10M
    lead-time-days: 90
  egensotning-address-monitor:
    cron: '0 0 4 * * *'
    name: egensotning-address-monitor
    shedlock-lock-at-most-for: PT10M
    maximum-execution-time: PT30M
  database-cleanup:
    cron: '0 0 3 * * *'
    name: database-cleanup
    shedlock-lock-at-most-for: PT5M
    maximum-execution-time: PT5M
