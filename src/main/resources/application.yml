#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
springdoc:
  swagger-ui:
    operationsSorter: alpha
    tagsSorter: alpha
spring:
  application:
    name: rtj-management
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: false
  jpa:
    properties:
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none
  security:
    oauth2:
      client:
        registration:
          operaton:
            authorization-grant-type: client_credentials
            provider: operaton
          citizen:
            authorization-grant-type: client_credentials
            provider: citizen
          templating:
            authorization-grant-type: client_credentials
            provider: templating
#========================================
# Integration settings
#========================================
integration:
  operaton:
    connect-timeout: 5
    read-timeout: 30
  citizen:
    connect-timeout: 5
    read-timeout: 30
  templating:
    connect-timeout: 5
    read-timeout: 30
    template-identifier: egensotning-beslut
#========================================
# Notification settings
#========================================
notification:
  ttl: P30D
scheduler:
  notification-cleanup:
    cron: '0 0 2 * * *'
    name: notification-cleanup
    shedlock-lock-at-most-for: PT5M
    maximum-execution-time: PT5M
